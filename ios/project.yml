name: macdar
options:
  bundleIdPrefix: com.fahrenheitresearch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: macdar/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.fahrenheitresearch.macdar
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: macdar/Bridge/macdar-Bridging-Header.h
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    GCC_PREPROCESSOR_DEFINITIONS:
      - "TARGET_OS_IPHONE=1"
    OTHER_LDFLAGS:
      - "-lcurl"
      - "-lz"
      - "-lbz2"

targets:
  macdar:
    type: application
    platform: iOS
    sources:
      # Swift app files
      - path: macdar/App
        type: group
      - path: macdar/Views
        type: group
      - path: macdar/Renderer
        type: group
      - path: macdar/Bridge
        type: group
        compilerFlags:
          - "-fobjc-arc"
      # Shared C++ sources (compiled as ObjC++)
      - path: ../src/app.cpp
        compilerFlags: "-x objective-c++ -fobjc-arc"
      - path: ../src/historic.cpp
        compilerFlags: "-x objective-c++ -fobjc-arc"
      - path: ../src/nexrad/level2_parser.cpp
      - path: ../src/net/downloader.cpp
      - path: ../src/net/polling_links.cpp
      - path: ../src/net/warnings.cpp
      - path: ../src/render/color_table.cpp
        compilerFlags: "-x objective-c++ -fobjc-arc"
      # Metal renderer
      - path: ../src/metal/MetalRenderer.mm
        compilerFlags: "-fobjc-arc"
      # Metal shaders
      - path: ../src/metal/gpu_pipeline.metal
      - path: ../src/metal/renderer.metal
      - path: ../src/metal/volume3d.metal
      # BZip2 (compiled from source)
      # Note: need to add bzip2 sources or link system libbz2
    settings:
      base:
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../src"
          - "$(PROJECT_DIR)/../src/metal"
          - "$(PROJECT_DIR)/macdar/Bridge"
    dependencies: []
    preBuildScripts: []
