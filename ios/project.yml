name: macdar
options:
  bundleIdPrefix: com.fahrenheitresearch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: macdar/Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.fahrenheitresearch.macdar
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: macdar/Bridge/macdar-Bridging-Header.h
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    OTHER_LDFLAGS:
      - "-lz"
      - "-lbz2"
    HEADER_SEARCH_PATHS:
      - "$(PROJECT_DIR)/shared_src"
      - "$(PROJECT_DIR)/shared_src/metal"
      - "$(PROJECT_DIR)/macdar/Bridge"
      - "$(PROJECT_DIR)/macdar/ThirdParty"

targets:
  macdar:
    type: application
    platform: iOS
    sources:
      # ── Swift UI ──
      - path: macdar/App
      - path: macdar/Views
      - path: macdar/Renderer
      # ── ObjC++ Bridge (includes IOSDownloader.mm) ──
      - path: macdar/Bridge
      # ── Resources ──
      - path: macdar/Resources
      # ── Shared C++ (compiled as ObjC++ for Metal header compat) ──
      - path: shared_src/app.cpp
        compilerFlags: "-x objective-c++ -fobjc-arc"
      - path: shared_src/historic.cpp
        compilerFlags: "-x objective-c++ -fobjc-arc"
      - path: shared_src/nexrad/level2_parser.cpp
        compilerFlags: "-x objective-c++"
      # NOTE: downloader.cpp replaced by macdar/Bridge/IOSDownloader.mm for iOS
      - path: shared_src/net/polling_links.cpp
        compilerFlags: "-x objective-c++"
      - path: shared_src/net/warnings.cpp
        compilerFlags: "-x objective-c++"
      - path: shared_src/render/color_table.cpp
        compilerFlags: "-x objective-c++ -fobjc-arc"
      # ── Metal display interop ──
      - path: shared_src/render/metal_interop.mm
        compilerFlags: "-fobjc-arc"
      # ── Metal Renderer (ObjC++) ──
      - path: shared_src/metal/MetalRenderer.mm
        compilerFlags: "-fobjc-arc"
      # ── Metal Shaders (compiled by Xcode into default.metallib) ──
      - path: shared_src/metal/gpu_pipeline.metal
      - path: shared_src/metal/renderer.metal
      - path: shared_src/metal/volume3d.metal
